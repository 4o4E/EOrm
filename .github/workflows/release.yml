name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 1.0.0"
        required: true
        type: string
      publish:
        description: "是否发布 Maven 包到 Nexus 和 Maven Central"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Release
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ inputs.version }}"
            tag="v${version}"
          fi

          if [[ -z "${version}" ]]; then
            echo "Release version is empty" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build, test and publish Maven packages
        shell: bash
        env:
          PUBLISH: ${{ github.event_name == 'push' || inputs.publish }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          tasks=(check)

          if [[ "${PUBLISH}" != "true" ]]; then
            echo "Skip Maven publish, build local artifacts only"
            tasks+=(assemble sourcesJar)
          else
            tasks+=(publishAllPublicationsToNexusRepository)
            if [[ "${RELEASE_VERSION}" == *-SNAPSHOT ]]; then
              tasks+=(publishToMavenCentral)
            else
              tasks+=(publishAndReleaseToMavenCentral)
            fi
          fi

          ./gradlew --no-daemon --build-cache -PreleaseVersion="${RELEASE_VERSION}" "${tasks[@]}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eorm-${{ steps.version.outputs.version }}-artifacts
          path: |
            eorm-*/build/libs/*.jar
            **/build/reports/tests/
            **/build/reports/jacoco/
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          artifacts=(eorm-*/build/libs/*.jar)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${artifacts[@]}" --clobber
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            gh release create "${TAG}" "${artifacts[@]}" --title "${TAG}" --generate-notes --verify-tag
          else
            gh release create "${TAG}" "${artifacts[@]}" --title "${TAG}" --generate-notes --target "${GITHUB_SHA}"
          fi
